version: "3.8"

# Local development compose for Project 01 — Sidecar Pattern.
# Runs the Flask API and Fluent Bit sidecar together, wired to the
# shared LocalStack instance on the localstack-net network.
#
# Usage:
#   docker compose up --build
#
# Prerequisites:
#   LocalStack must be running: cd ../../localstack && docker compose up -d

services:
  flask-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flask-api
    ports:
      - "5000:5000"
    environment:
      - LOG_DIR=/var/log/app
      - LOG_LEVEL=INFO
      - DYNAMODB_TABLE=load-balanced-counters
      - DYNAMODB_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=eu-west-1
    volumes:
      - app-logs:/var/log/app
    networks:
      - localstack-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  log-shipper:
    build:
      context: ../log-shipper
      dockerfile: Dockerfile
    container_name: log-shipper
    depends_on:
      flask-api:
        condition: service_healthy
    environment:
      - S3_BUCKET=sidecar-logs
      - S3_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=eu-west-1
      - FLUSH_INTERVAL=30
    volumes:
      - app-logs:/var/log/app:ro
    networks:
      - localstack-net

volumes:
  app-logs:

networks:
  localstack-net:
    external: true
    name: localstack-net
