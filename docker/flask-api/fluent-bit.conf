# fluent-bit.conf
# Sidecar configuration: tail app logs from shared volume, ship to LocalStack S3.
#
# This file is mounted into the Fluent Bit sidecar container.
# The main application writes JSON logs to /var/log/app/app.log.
# Fluent Bit tails that file and ships records to S3 in 60-second intervals.

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf

[INPUT]
    Name              tail
    Path              /var/log/app/app.log
    Parser            json
    Tag               app.logs
    Refresh_Interval  5
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On

[FILTER]
    Name    record_modifier
    Match   app.logs
    Record  container sidecar-flask-api
    Record  environment local

[OUTPUT]
    Name                         s3
    Match                        app.logs
    bucket                       ${S3_BUCKET}
    region                       eu-west-1
    # Point at LocalStack — override the default AWS S3 endpoint
    endpoint                     ${FLB_S3_ENDPOINT}
    total_file_size              1M
    upload_timeout               60s
    use_put_object               On
    s3_key_format                /logs/%Y/%m/%d/%H/%M-%S-$UUID.log
    store_dir                    /tmp/fluent-bit-buffer
